name: Deploy API to PBL VPS Admin 4C

on:
  push:
    branches:
      - master
jobs:
  deploy-to-vps-pbl:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy PBL Admin 4C
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_KELOMPOK1_4C }}
          script: |
            cd /root/kelompok-1-4c/simpadu_admin_4c_2026
            
            git stash

            git pull origin master
            
            docker compose exec -T php composer install --no-interaction --prefer-dist --optimize-autoloader
            
            docker compose exec -T php php artisan migrate --force
            
            docker compose exec -T php php artisan optimize:clear